---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-vm2
  namespace: vm-test
  annotations:
    cmdb: 1234
    vm.kubevirt.io/flavor: small
    vm.kubevirt.io/os: fedora
    vm.kubevirt.io/workload: server
  labels:
    app: test-vm2
    kubevirt.io/dynamic-credentials-support: "true"
    vm.kubevirt.io/template: fedora-server-small
    vm.kubevirt.io/template.namespace: openshift
    vm.kubevirt.io/template.revision: "1"
    vm.kubevirt.io/template.version: v1
spec:
  running: True
  dataVolumeTemplates:
    - metadata:
        name: test-vm2
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 30Gi
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: fedora
        vm.kubevirt.io/workload: server
      labels:
        app: test-vm2
        kubevirt.io/dynamic-credentials-support: "true"
        vm.kubevirt.io/template: fedora-server-small
        vm.kubevirt.io/template.namespace: openshift
        vm.kubevirt.io/template.revision: "1"
        vm.kubevirt.io/template.version: v1
    spec:
      domain:
        cpu:
          cores: 2
          sockets: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
        memory:
          guest: 2Gi
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - dataVolume:
            name: test-vm2
          name: rootdisk
        - cloudInitNoCloud:
            userData: |
              #cloud-config
              user: cloud-user
              password: redhat
              chpasswd: { expire: False }
          name: cloudinitdisk
