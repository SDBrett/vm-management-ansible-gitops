namespace: vm-test
virtualMachines:
  - vm_name: my-test-vm
    runStrategy: RerunOnFailure
    state: absent
    storage_size: 30Gi
    memory_size: 3Gi
    cpu_cores: 2
    cpu_sockets: 1
    cpu_threads: 1
    os_images_template: fedora
    os_images_project: openshift-virtualization-os-images
    network_interface1_name: default
    cloud_init_password: redhat

  - vm_name: test-vm2
    reboot_on_change: true
    runStrategy: RerunOnFailure
    state: present
    storage_size: 30Gi
    memory_size: 3Gi
    cpu_cores: 2
    cpu_sockets: 1
    cpu_threads: 1
    os_images_template: fedora
    os_images_project: openshift-virtualization-os-images
    network_interface1_name: default
    cloud_init_password: redhat

  - vm_name: test-vm3
    reboot_on_change: true
    runStrategy: RerunOnFailure
    instance_type:
      name: u1.small
      kind: virtualMachineClusterInstancetype
    state: present
    storage_size: 30Gi
    memory_size: 3Gi
    cpu_cores: 2
    cpu_sockets: 1
    cpu_threads: 1
    os_images_template: fedora
    os_images_project: openshift-virtualization-os-images
    network_interface1_name: default
    cloud_init_password: redhat